<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雪山档案 - 中国雪山图鉴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Noto Serif SC', serif;
      background: #0b0b18;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 40px;
      background: rgba(11,11,24,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .top-nav .logo-link { font-size: 18px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 2px; }
    .top-nav .logo-link span { color: #8ab4ff; }
    .top-nav .nav-links { display: flex; gap: 6px; list-style: none; }
    .top-nav .nav-links a {
      color: rgba(255,255,255,0.6); text-decoration: none;
      padding: 7px 16px; border-radius: 8px; font-size: 13px; transition: all 0.3s;
    }
    .top-nav .nav-links a:hover,
    .top-nav .nav-links a.active { color: #fff; background: rgba(255,255,255,0.08); }
    .top-nav .nav-links a.active { color: #8ab4ff; background: rgba(138,180,255,0.1); }

    .main-wrap { max-width: 1200px; margin: 0 auto; padding: 100px 24px 60px; }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-size: 32px; font-weight: 600; color: #fff; letter-spacing: 0.05em; }
    .page-header p { font-size: 14px; color: #a4a4b9; margin-top: 8px; }
    .page-header .divider { width: 50px; height: 2px; background: linear-gradient(90deg, #8ab4ff, #a78bfa); margin: 16px auto 0; border-radius: 2px; }

    /* 筛选栏 */
    .filter-bar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .filter-bar select,
    .filter-bar input {
      padding: 8px 14px; border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #ccc; font-family: 'Georgia', 'Noto Serif SC', serif;
      font-size: 12px; outline: none;
      transition: border 0.3s;
    }
    .filter-bar select:focus,
    .filter-bar input:focus { border-color: #8ab4ff; }
    .filter-bar select option { background: #1a1a2e; color: #ccc; }
    .filter-bar .btn {
      padding: 8px 20px; border-radius: 6px; border: none;
      background: #8ab4ff; color: #0b0b18; font-size: 12px;
      font-weight: 600; cursor: pointer;
      font-family: 'Georgia', 'Noto Serif SC', serif;
      transition: all 0.3s; letter-spacing: 1px;
    }
    .filter-bar .btn:hover { background: #a3c4ff; }
    .filter-bar .btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: #8888aa;
    }
    .filter-bar .btn-reset:hover { background: rgba(255,255,255,0.04); }

    .result-meta { font-size: 14px; color: #9696a9; margin-bottom: 24px; letter-spacing: 2px; }
    .result-meta span { color: #8ab4ff; }

    /* ===== 杂志风格：左右交替布局 ===== */
    .magazine-list { display: flex; flex-direction: column; gap: 40px; }

    .mag-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 40px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .mag-item:last-child { border-bottom: none; padding-bottom: 0; }
    .mag-item:hover .mag-img img { transform: scale(1.03); }

    .mag-img {
      height: 360px;
      overflow: hidden;
      position: relative;
    }
    .mag-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* 奇数列：图片右下斜切 / 偶数列：图片左下斜切 */
    .mag-item:nth-child(odd) .mag-img {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 92%);
    }
    .mag-item:nth-child(even) .mag-img {
      clip-path: polygon(0 0, 100% 0, 100% 92%, 0 100%);
    }

    .mag-img .number {
      position: absolute;
      top: 16px; left: 16px;
      font-size: 48px; font-weight: 900;
      color: rgba(255,255,255,0.8);
      line-height: 1;
      letter-spacing: -2px;
      pointer-events: none;
    }

    .mag-text {
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 32px 36px;
    }
    
    .mag-item:nth-child(even) .mag-text {
      order: -1;
      padding-left: 0;
      padding-right: 36px;
    }

    .mag-text .label {
      font-size: 11px; color: #8ab4ff;
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .mag-text .label .dot {
      display: inline-block; width: 6px; height: 6px;
      background: #8ab4ff; border-radius: 50%;
      margin-right: 8px; vertical-align: middle;
    }
    .mag-text h2 {
      font-size: 28px; font-weight: 700; color: #fff;
      line-height: 1.2; margin-bottom: 4px;
    }
    .mag-text .sub {
      font-size: 14px; color: #8ab4ff; font-weight: 400;
      margin-bottom: 14px;
    }
    .mag-text .meta {
      display: flex; gap: 16px; margin-bottom: 14px;
    }
    .mag-text .meta span {
      font-size: 11px; color: #666688;
      padding: 3px 10px; border-radius: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .mag-text .meta .diff-简单 { color: #6ee7b7; border-color: rgba(110,231,183,0.2); }
    .mag-text .meta .diff-中等 { color: #fbbf24; border-color: rgba(251,191,36,0.2); }
    .mag-text .meta .diff-困难 { color: #fb923c; border-color: rgba(251,146,60,0.2); }
    .mag-text .meta .diff-极高 { color: #f87171; border-color: rgba(248,113,113,0.2); }

    .mag-text p {
      font-size: 14px; color: #9999bb; line-height: 1.8;
      margin-bottom: 16px;
    }
    .img-credit {
      font-size: 10px;
      color: #555577;
      margin-bottom: 10px;
      line-height: 1.5;
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 8px;
    }
    .mag-text .read-more {
      font-size: 12px; color: #8ab4ff; text-decoration: none;
      letter-spacing: 1px; transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .mag-text .read-more:hover { gap: 12px; }

    /* 弹窗 */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      justify-content: center; align-items: center; padding: 24px;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: #141428; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; max-width: 600px; width: 100%;
      max-height: 80vh; overflow-y: auto; position: relative;
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-content .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-img-wrap {
      position: relative;
      width: 100%;
      height: 260px;
    }
    .modal-img-wrap .modal-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      border-radius: 20px 20px 0 0;
    }
    .modal-download-btn {
      position: absolute;
      bottom: 12px; right: 12px;
      padding: 5px 12px;
      font-size: 11px;
      border-radius: 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-download-btn:hover {
      background: rgba(138,180,255,0.25);
      border-color: rgba(138,180,255,0.35);
      transform: scale(1.03);
    }
    .modal-download-btn:hover {
      background: rgba(138,180,255,0.3);
      border-color: rgba(138,180,255,0.4);
      transform: scale(1.1);
    }
    .modal-content .modal-body { padding: 28px 30px; }
    .modal-content .modal-body h2 { font-size: 24px; color: #fff; margin-bottom: 4px; }
    .modal-content .modal-body .modal-elev { font-size: 15px; color: #8ab4ff; margin-bottom: 14px; }
    .modal-content .modal-body .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-content .modal-body .modal-tags .tag { font-size: 12px; padding: 4px 14px; border-radius: 10px; background: rgba(255,255,255,0.05); color: #aaaacc; }
    .modal-content .modal-body .modal-desc { font-size: 14px; color: #9999bb; line-height: 1.8; margin-bottom: 20px; }
    .modal-content .modal-body .modal-link { display: inline-block; padding: 10px 24px; border-radius: 10px; background: linear-gradient(135deg, #8ab4ff, #a78bfa); color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.3s; }
    .modal-content .modal-body .modal-link:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(138,180,255,0.2); }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 18px; cursor: pointer; transition: all 0.3s; }
    .modal-close:hover { background: rgba(255,255,255,0.1); }
    .modal-back-tip {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 3px;
      pointer-events: none;
      user-select: none;
    }

    footer { text-align: center; padding: 24px 20px; font-size: 12px; color: #555577; border-top: 1px solid rgba(255,255,255,0.06); line-height: 2; background: #0b0b1a; }
    footer p:last-child { margin-top: 4px; font-size: 11px; color: #444466; }

    @media (max-width: 820px) {
      .top-nav { padding: 16px 20px; }
      .top-nav .logo-link { font-size: 15px; }
      .top-nav .nav-links a { padding: 5px 10px; font-size: 12px; }
      .page-header h1 { font-size: 26px; }
      .mag-item { grid-template-columns: 1fr; gap: 0; }
      .mag-img { height: 240px; }
      .mag-item:nth-child(odd) .mag-img,
      .mag-item:nth-child(even) .mag-img { clip-path: none; border-radius: 12px; }
      .mag-text { padding: 20px 0 !important; }
      .mag-item:nth-child(even) .mag-text { order: 0; }
      .mag-text h2 { font-size: 22px; }
    }
  </style>
</head>

<script>
  var mountains = [
    {"name":"珠穆朗玛峰","sub":"世界之巅","elevation":"8848.86m","province":"西藏","difficulty":"极高","description":"地球最高点，位于喜马拉雅山脉中尼边界。1953年人类首次登顶，1960年中国登山队首次从北坡登顶。每年吸引数百名登山者挑战极限。",
    "image":"mountainPhoto/MountEverest珠穆朗玛峰/8.jpg",
    "link":"https://baike.baidu.com/item/%E7%8F%A0%E7%A9%86%E6%9C%97%E7%8E%9B%E5%B3%B0"},
    
    {"name":"乔戈里峰（K2）","sub":"登山界的王","elevation":"8611m","province":"新疆","difficulty":"极高","description":"世界第二高峰，登山界公认的\"王者之峰\"。位于喀喇昆仑山脉，攀登死亡率高达27%，技术难度远超珠峰，被公认为最难攀登的8000米级山峰。",
    "image":"mountainPhoto/K2乔戈里峰/1.jpg",
    "link":"https://baike.baidu.com/item/%E4%B9%94%E6%88%88%E9%87%8C%E5%B3%B0"},
   
    {"name":"贡嘎雪山","sub":"蜀山之王","elevation":"7556m","province":"四川","difficulty":"极高","description":"横断山脉最高峰，世界相对高差最大的山峰之一。垂直落差达6000米以上，登顶死亡率超过50%，被登山界称为\"魔鬼山峰\"。",
    "image":"mountainPhoto/MountGongga贡嘎雪山/2.jpg",
    "link":"https://baike.baidu.com/item/%E8%B4%A1%E5%98%8E%E9%9B%AA%E5%B1%B1"},
    
    {"name":"南迦巴瓦峰","sub":"中国最美雪山","elevation":"7782m","province":"西藏","difficulty":"极高","description":"《中国国家地理》评选的\"中国最美雪山\"。因常年云雾缭绕、十人九不遇而被称为\"云中天堂\"。雅鲁藏布江大峡谷环绕其脚下，景色壮丽。",
    "image":"mountainPhoto/NamchaBarwa南迦巴瓦/3.jpg",
    "link":"https://baike.baidu.com/item/%E5%8D%97%E8%BF%A6%E5%B7%B4%E7%93%A6%E5%B3%B0"},
    
    {"name":"冈仁波齐","sub":"神山之王","elevation":"6656m","province":"西藏","difficulty":"中等","description":"被藏传佛教、印度教、耆那教、苯教四大宗教共同视为世界中心的神山。至今无人登顶，每年无数信徒绕山转经朝圣，是信仰的终极象征。",
    "image":"mountainPhoto/MountKailash冈仁波齐/4.jpg",
    "link":"https://baike.baidu.com/item/%E5%86%88%E4%BB%81%E6%B3%A2%E9%BD%90"},
    
    {"name":"梅里雪山（卡瓦格博）","sub":"藏区八大神山之首","elevation":"6740m","province":"云南","difficulty":"极高","description":"藏区八大神山之首，主峰卡瓦格博至今无人登顶。1991年中日联合登山队17人遇难后明令禁止攀登，是世界上最著名的\"禁登山峰\"。",
    "image":"mountainPhoto/MeiliSnowMountain梅里雪山/2.jpg",
    "link":"https://baike.baidu.com/item/%E6%A2%85%E9%87%8C%E9%9B%AA%E5%B1%B1"},
    
    {"name":"四姑娘山","sub":"蜀山皇后","elevation":"6250m","province":"四川","difficulty":"中等","description":"横断山脉东部边缘的明珠，被誉为\"东方的阿尔卑斯\"。幺妹峰海拔6250米，大峰（5025m）适合入门登山者，是登山爱好者的天堂。",
    "image":"mountainPhoto/SiguniangShan四姑娘山/3.jpg",
    "link":"https://baike.baidu.com/item/%E5%9B%9B%E5%A7%91%E5%A8%98%E5%B1%B1"},
    
    {"name":"玉龙雪山","sub":"纳西神山","elevation":"5596m","province":"云南","difficulty":"极高","description":"北半球最南端的雪山，纳西族神山。主峰扇子陡至今无人登顶，属禁攀处女峰。旅游索道可达4506米冰川公园，可近距离仰望雪山雄姿。十三座雪峰连绵不绝，宛如巨龙腾飞。",
    "image":"mountainPhoto/JadeDragonSnowMountain玉龙雪山/3.jpg",
    "link":"https://baike.baidu.com/item/%E7%8E%89%E9%BE%99%E9%9B%AA%E5%B1%B1"},
    
    {"name":"托木尔峰","sub":"天山之王","elevation":"7443m","province":"新疆","difficulty":"极高","description":"天山山脉最高峰，位于新疆温宿县。冰川发育极为发达，拥有天山最大的冰川——托木尔冰川。是天山山脉的标志性山峰。",
    "image":"mountainPhoto/TianshanMountain天山/2.jpg",
    "link":"https://baike.baidu.com/item/%E6%89%98%E6%9C%A8%E5%B0%94%E5%B3%B0"},
    
    {"name":"阿尼玛卿","sub":"藏区四大神山之一","elevation":"6282m","province":"青海","difficulty":"困难","description":"藏区四大神山之一，与冈仁波齐、梅里雪山、尕朵觉沃齐名。藏族人心中的\"父亲山\"，每年有大量信徒绕山朝拜。",
    "image":"mountainPhoto/AmneMachin阿尼玛卿/2.jpg",
    "credit":"Raki_Man，CC BY 3.0，来自 Wikimedia Commons（未修改）",
    "link":"https://baike.baidu.com/item/%E9%98%BF%E5%B0%BC%E7%8E%9B%E5%8D%BF"},
    
    {"name":"雪宝顶","sub":"岷山主峰","elevation":"5588m","province":"四川","difficulty":"中等","description":"岷山山脉主峰，藏语称\"夏旭冬日\"，意为东方海螺山。位于四川松潘县，是登山爱好者的进阶训练山峰，登顶可览岷山群峰。",
    "image":"mountainPhoto/Xuebaoding雪宝顶/1.jpg",
    "link":"https://baike.baidu.com/item/%E9%9B%AA%E5%AE%9D%E9%A1%B6"},
    
    {"name":"哈巴雪山","sub":"入门级雪山之王","elevation":"5396m","province":"云南","difficulty":"简单","description":"无数登山爱好者的第一座雪山。位于香格里拉，路线成熟、协作完善、登顶率高。哈巴在纳西语中意为\"金子之花\"。",
    "image":"mountainPhoto/HabaMountain哈巴雪山/1.jpg",
    "link":"https://baike.baidu.com/item/%E5%93%88%E5%B7%B4%E9%9B%AA%E5%B1%B1"}
  ];

  var list = document.getElementById('magazineList');
  var countEl = document.getElementById('resultCount');
  var filterProvince = document.getElementById('filterProvince');
  var filterDifficulty = document.getElementById('filterDifficulty');
  var filterKeyword = document.getElementById('filterKeyword');

  var provinces = [];
  for (var i = 0; i < mountains.length; i++) {
    if (provinces.indexOf(mountains[i].province) === -1) provinces.push(mountains[i].province);
  }
  provinces.sort();
  var optHtml = '<option value="all">全部省份</option>';
  for (var j = 0; j < provinces.length; j++) optHtml += '<option value="' + provinces[j] + '">' + provinces[j] + '</option>';
  filterProvince.innerHTML = optHtml;

  function renderMagazine(listData) {
    countEl.textContent = listData.length;
    if (listData.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:80px 20px;color:#555577;font-size:15px;">没有找到匹配的雪山</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < listData.length; i++) {
      var m = listData[i];
      var num = (i + 1).toString().padStart(2, '0');
      html += '<div class="mag-item" data-idx="' + i + '">' +
        '<div class="mag-img"><div class="number">' + num + '</div><img src="' + m.image + '" alt="' + m.name + '" loading="lazy"></div>' +
        '<div class="mag-text">' +
          '<div class="label"><span class="dot"></span>' + m.province + '</div>' +
          '<h2>' + m.name + '</h2>' +
          '<div class="sub">' + m.sub + ' · ' + m.elevation + '</div>' +
          '<div class="meta"><span class="diff-' + m.difficulty + '">难度：' + m.difficulty + '</span><span>' + m.elevation + '</span></div>' +
          '<p>' + m.description + '</p>' +
          (m.credit ? '<div class="img-credit">📷 ' + m.credit + '</div>' : '') +
          '<span class="read-more">查看卡片/下载风景图 &rarr;</span>' +
        '</div></div>';
    }
    list.innerHTML = html;
    var items = document.querySelectorAll('.mag-item');
    for (var k = 0; k < items.length; k++) {
      (function(idx) {
        items[k].addEventListener('click', function() { showModal(listData[idx]); });
      })(k);
    }
  }

  function filterData() {
    var p = filterProvince.value;
    var d = filterDifficulty.value;
    var kw = filterKeyword.value.trim().toLowerCase();
    var result = [];
    for (var i = 0; i < mountains.length; i++) {
      var m = mountains[i];
      if (p !== 'all' && m.province !== p) continue;
      if (d !== 'all' && m.difficulty !== d) continue;
      if (kw && m.name.indexOf(kw) === -1 && m.sub.indexOf(kw) === -1) continue;
      result.push(m);
    }
    renderMagazine(result);
  }

  document.getElementById('filterBtn').addEventListener('click', filterData);
  document.getElementById('resetBtn').addEventListener('click', function() {
    filterProvince.value = 'all';
    filterDifficulty.value = 'all';
    filterKeyword.value = '';
    filterData();
  });

  var overlay = document.getElementById('modalOverlay');

  function showModal(m) {
    document.getElementById('modalImg').src = m.image;
    document.getElementById('modalName').textContent = m.name;
    document.getElementById('modalElev').textContent = m.sub + ' · 海拔 ' + m.elevation;
    document.getElementById('modalTags').innerHTML = '<span class="tag">' + m.province + '</span><span class="tag">难度：' + m.difficulty + '</span>';
    document.getElementById('modalDesc').textContent = m.description;
    // 图片版权信息
    var creditEl = document.getElementById('modalCredit');
    if (creditEl) {
      if (m.credit) {
        creditEl.textContent = '📷 ' + m.credit;
        creditEl.style.display = 'block';
      } else {
        creditEl.style.display = 'none';
      }
    }
    document.getElementById('modalLink').href = m.link;
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function downloadModalImage() {
    var img = document.getElementById('modalImg');
    var name = document.getElementById('modalName').textContent || '雪山';
    var link = document.createElement('a');
    link.href = img.src;
    link.download = name + '.jpg';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  document.getElementById('modalDownloadBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    downloadModalImage();
  });

  document.getElementById('modalClose').addEventListener('click', function() {
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  });
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) { overlay.classList.remove('show'); document.body.style.overflow = ''; }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { overlay.classList.remove('show'); document.body.style.overflow = ''; }
  });

  filterData();


  function downloadModalImage() {
    var img = document.getElementById('modalImg');
    var name = document.getElementById('modalName').textContent || '雪山';

    // 用fetch拿到图片二进制数据，转blob后通过URL.createObjectURL下载
    fetch(img.src)
      .then(function(res) { return res.blob(); })
      .then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name + '.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // 释放临时URL
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      })
      .catch(function() {
        // fallback：如果fetch跨域失败，用传统方式
        var a = document.createElement('a');
        a.href = img.src;
        a.download = name + '.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
  }

  document.getElementById('modalDownloadBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    downloadModalImage();
  });
</script>
